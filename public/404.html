<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>nenehome</title>
  <script>
    // SPA redirect for GitHub Pages.
    // When a page isn't found, redirect to the root preserving the path
    // as a query param so the app can restore it client-side.
    // basePath /nenehome = 1 segment to keep.
    var seg = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
